<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arc Raiders Rundenzähler-Steuerung</title>
<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  min-height: 100%;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.panel {
  width: min(760px, 100%);
  background: rgba(0,0,0,.82);
  border-radius: 24px;
  padding: 28px;
  box-shadow: 0 14px 40px rgba(0,0,0,.35);
}
h1 {
  margin: 0 0 8px;
  font-size: 34px;
}
.sub {
  margin: 0 0 22px;
  opacity: .88;
  font-size: 16px;
}
.display {
  display: inline-flex;
  align-items: baseline;
  gap: 16px;
  padding: 18px 28px;
  border-radius: 18px;
  background: rgba(12, 12, 12, 0.92);
  color: #ffffff;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
  margin-bottom: 24px;
}
.current {
  font-size: 72px;
  font-weight: 900;
  line-height: 1;
  color: #4cff6a;
  text-shadow: 0 0 10px rgba(76,255,106,.35);
}
.total {
  font-size: 46px;
  font-weight: 700;
  opacity: 0.95;
}
.controls {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
}
button {
  border: 0;
  border-radius: 18px;
  padding: 20px 16px;
  font-size: 38px;
  font-weight: 900;
  cursor: pointer;
  color: white;
  background: #2141b6;
}
button:hover { filter: brightness(1.08); }
button:active { transform: translateY(1px); }
button.reset {
  font-size: 22px;
  background: #353535;
}
.note {
  margin-top: 18px;
  font-size: 14px;
  opacity: .8;
}
</style>
</head>
<body>
  <div class="panel">
    <h1>Arc Raiders Rundenzähler</h1>
    <p class="sub">Mit + und - kannst du die benötigten Runden manuell hoch- oder runterzählen.</p>

    <div class="display">
      <div class="current" id="current">0</div>
      <div class="total">Runden</div>
    </div>

    <div class="controls">
      <button id="minus" aria-label="Minus">-</button>
      <button id="reset" class="reset">Reset</button>
      <button id="plus" aria-label="Plus">+</button>
    </div>

    <div class="note">Der Rundenzähler startet bei 0. Minus zieht wieder eine Runde ab.</div>
  </div>

<script>
const STORAGE_KEY = "arc_raiders_rounds_manual_v1";

function loadValue() {
  const raw = localStorage.getItem(STORAGE_KEY);
  const num = Number(raw);
  if (!Number.isFinite(num)) return 0;
  return Math.max(0, Math.round(num));
}
function saveValue(value) {
  localStorage.setItem(STORAGE_KEY, String(value));
}
function render(value) {
  document.getElementById("current").textContent = String(value);
}

let current = loadValue();
render(current);

document.getElementById("plus").addEventListener("click", () => {
  current += 1;
  saveValue(current);
  render(current);
});
document.getElementById("minus").addEventListener("click", () => {
  current = Math.max(0, current - 1);
  saveValue(current);
  render(current);
});
document.getElementById("reset").addEventListener("click", () => {
  current = 0;
  saveValue(current);
  render(current);
});
</script>
</body>
</html>
