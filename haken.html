<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arc Raiders Haken-Zähler</title>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; font-family: Arial, sans-serif; }
body { display: flex; align-items: center; justify-content: center; }
.counter { display: inline-flex; align-items: baseline; gap: 16px; padding: 18px 28px; border-radius: 18px; background: rgba(0,0,0,.78); color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,.35); }
.current { font-size: 72px; font-weight: 900; line-height: 1; color: #4cff6a; text-shadow: 0 0 10px rgba(76,255,106,.35); }
.total { font-size: 46px; font-weight: 700; opacity: .95; }
</style>
</head>
<body>
  <div class="counter">
    <div class="current" id="current">0</div>
    <div class="total">/ 77</div>
  </div>
<script>
const STORAGE_KEY = "arc_raiders_blueprint_checks_v77";
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function checkedCount(state) { return Object.values(state).filter(Boolean).length; }
function render() { document.getElementById('current').textContent = String(checkedCount(loadState())); }
window.addEventListener('storage', render);
setInterval(render, 400);
render();
</script>
</body>
</html>
